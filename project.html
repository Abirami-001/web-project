<html>
<head>
    <style>
        body {
            font-family: Arial;
            background-color: grey;
            margin: 20px;
        }

        h2 {
            text-align: center;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 16px;
        }

        #result {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            width: 300px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0px 2px 8px gray;
        }

        .card h3 {
            text-align: center;
            color: blue;
        }

        .card p {
            margin: 6px 0;
        }
    </style>

</head>

<body>

    <h2>Users List</h2>

    <button onclick="getData()">Send</button>

    <div id="result"></div>

    <script>

        function getData() {

            fetch("https://jsonplaceholder.typicode.com/posts")
    	    .then(response => response.json())
    	    .then(data => {

            let output = "";

            for (let i = 0; i < data.length; i++) {

            output += `
                <div class="card">

                    <h3>${data[i].title}</h3>

                    <p><b>ID:</b> ${data[i].id}</p>
                    <p><b>User ID:</b> ${data[i].userId}</p>
                    <p><b>Body:</b> ${data[i].body}</p>

                </div>
            `;
        }

        document.getElementById("result").innerHTML = output;
    })
    .catch(error => console.log(error));

        }

    </script>

</body>

</html>
