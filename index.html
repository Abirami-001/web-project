<!DOCTYPE html>
<html>
<head>
    <title>Users Posts with Pagination</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f4f8;
            margin: 20px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
            padding: 20px;
            background: white;
            border: 3px solid #007bff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        #sendBtn {
            display: block;
            margin: 20px auto;
            padding: 10px 25px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        #sendBtn:hover {
            background: #0056b3;
        }

        #result {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            width: 280px;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card h3 {
            color: #007bff;
            text-align: center;
        }

        .card p {
            color: #444;
            line-height: 1.5;
        }

        #pagination {
            text-align: center;
            margin-top: 25px;
        }

        #pagination button {
            padding: 8px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        #pagination button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Users Posts</h2>

        <button id="sendBtn" onclick="getData()">Load Posts</button>

        <div id="result"></div>

        <div id="pagination"></div>

    </div>

    <script>

        let allPosts = [];
        let postsPerPage = 10;

        function getData() {

            fetch("https://jsonplaceholder.typicode.com/posts")
                .then(response => response.json())
                .then(data => {

                    allPosts = data;
                    showPage(1);
                    createPagination();

                })
                .catch(error => console.log(error));
        }

        function showPage(page) {

            let start = (page - 1) * postsPerPage;
            let end = start + postsPerPage;

            let output = "";

            for (let i = start; i < end && i < allPosts.length; i++) {

                output += `
                <div class="card">
                    <h3>${allPosts[i].title}</h3>
                    <p><b>ID:</b> ${allPosts[i].id}</p>
                    <p><b>User ID:</b> ${allPosts[i].userId}</p>
                    <p><b>Body:</b> ${allPosts[i].body}</p>
                </div>
                `;
            }

            document.getElementById("result").innerHTML = output;
        }

        function createPagination() {

            let totalPages = Math.ceil(allPosts.length / postsPerPage);

            let buttons = "";

            for (let i = 1; i <= totalPages; i++) {
                buttons += `<button onclick="showPage(${i})">${i}</button>`;
            }

            document.getElementById("pagination").innerHTML = buttons;
        }

    </script>

</body>
</html>
